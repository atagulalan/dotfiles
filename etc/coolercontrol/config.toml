# Cooler Control Settings
# -------------------------------
# This is where CoolerControl specifc general and specifc device settings are set. These device
# settings differ from the above Device Settings, in that they are applied to CoolerControl,
# and not on the devices themselves. For ex. settings such as disabling/enabling a particular device.
[settings]

# whether to apply the saved device settings on daemon startup
apply_on_boot = true

# Whether to enable the integration with liquidctl.
# Disabling this will prevent any communication with liquidctl,
# and all HWMon supported devices will be shown.
liquidctl_integration = true

# There are some devices that are supported both by liquidctl and hwmon drivers. Normally the
# preference is to use liquidctl as it supports more features such as RGB control. There are
# some cases where the hwmon driver is preferred though. Note: Care should be taken to blacklist
# one of the devices to avoid needlessly loading the device IO and avoid concurrency issues.
# Use at your own risk.
hide_duplicate_devices = true

# Will skip initialization calls for liquidctl devices. ONLY USE if you are doing initialiation manually.
no_init = false

# Startup Delay (seconds) is an integer value between 0 and 10
startup_delay = 2

# For ThinkPads, wheather to use the 'full-speed' option when settings the fan to 100%
# This option drives the fan as fast as it can go, which might exceed hardware limits,
# so use this level with caution.
thinkpad_full_speed = false

# API Address and Port:
# The daemon by default uses port 11987 and the standard loopback IPv4 and IPv6 addresses.
# You can set an IPv4, IPv6 or both addresses to listen on. An empty string will disable the address.
# It is highly recommended to use the default settings unless you have a specific reason to change them
# and understand the implications.
# If you expose the API to a public network, it is recommended to use TLS/HTTPS (see below).
# For more information see the project wiki.
# Example:
# port = 11987
# ipv4_address = "127.0.0.1"
# ipv6_address = "::1"

# Whether to compress the response payload from the API. This will reduce the size of the response
# but will increase CPU usage a tiny bit. This is useful if you are running the API over a network.
# 'compress' is deprecated, use compress_payload instead.
compress_payload = true

# The polling rate for sensor data collection. The default is 1.0 second. Limited to values
# between 0.5 and 5.0 seconds in half-second increments.
# Note: Caution should be used when using values less than 1.0.
# poll_rate = 1.0

# Whether to check if drivetemp supported drives are in a suspended state/spun down, and if so,
# return 0C as their reporting temperature.
drivetemp_suspend = false
poll_rate = 1.0
tls_enabled = true
allow_unencrypted = false
sensors_auto_detect = true
device_listener_enabled = true

# TLS/HTTPS Configuration:
# TLS to secure the REST API with HTTPS. (enabled by default)
# When enabled, a self-signed certificate will be automatically generated on first startup if no
# certificate paths are specified. The certificate and key are stored in /etc/coolercontrol/ by
# default.
# Note: Self-signed certificates will cause browser warnings. You can provide your own
# certificate by specifying the paths below, or use a reverse proxy (nginx, caddy, traefik)
# to handle TLS termination as an alternative approach.
# tls_enabled = true
# tls_cert_path = "/etc/coolercontrol/coolercontrol.crt"
# tls_key_path = "/etc/coolercontrol/coolercontrol.key"

# Reverse Proxy / CORS Configuration:
# Custom origins to allow in CORS requests. This is useful when accessing CoolerControl through
# a reverse proxy with a custom domain, or via port forwarding with a public IP. Add the full
# origin URL (scheme + host + port if non-standard).
# origins = ["https://coolercontrol.mydomain.com", "http://192.168.1.1:8080"]

# Header to check for the client's original protocol when behind a reverse proxy. Common values
# are "X-Forwarded-Proto" (nginx, Apache) or "X-Scheme". When this header indicates "https",
# the HTTP-to-HTTPS redirect is skipped (the proxy handles TLS termination).
# protocol_header = "X-Forwarded-Proto"

# Allow unencrypted HTTP connections from non-localhost addresses. By default, non-localhost
# HTTP requests are redirected to HTTPS when TLS is enabled. Set this to true to allow HTTP.
# Note: This should only be used as a last resort and is not recommended.
# allow_unencrypted = false

# Whether to auto-detect Super-I/O hardware sensors and load the appropriate kernel
# modules at startup. This helps ensure all hwmon chips are available. (x86_64 only)
# sensors_auto_detect = true

# Whether to listen for kernel device add/remove events (e.g. USB hotplug) at startup.
# When enabled, the daemon watches for hardware changes and notifies connected clients.
# Disable this in containers or environments without netlink socket access.
# device_listener_enabled = true

# CoolerControl Device settings Example:
# [settings.4b9cd1bc5fb2921253e6b7dd5b1b011086ea529d915a86b3560c236084452807]
# disabled = true
